        <h1 style="margin:0 0 8px">TraceMate — AR Tracing in Your Browser</h1>
        <p style="font-size:1.1rem;color:#444"><strong>Trace any image onto real paper using your phone camera.</strong> Browser-based — no app install required.</p>

        <h2>What TraceMate is</h2>
        <p>TraceMate is an augmented-reality (AR) tracing web app at <a href="https://www.tracemate.art/">tracemate.art</a>. Open the site on your phone, allow camera access, upload any reference image, and TraceMate overlays that image as a live transparent layer on whatever paper your camera is pointed at. You trace the overlay by hand with a pencil — the lines stay on the paper after the phone is removed.</p>
        <p>Unlike native apps such as Da Vinci Eye, AR Sketch, Trace Anything, Papercopy Tracer, and SketchAR, TraceMate runs entirely in a phone web browser. There is nothing to install. It works on iOS 14+, Android 10+, iPad, and any modern desktop browser with a webcam.</p>

        <h2>Who it's for</h2>
        <ul>
          <li><strong>Tattoo artists</strong> placing stencils freehand without printing.</li>
          <li><strong>Calligraphers and lettering artists</strong> laying out letters and flourishes.</li>
          <li><strong>Portrait and figure artists</strong> getting proportions right from a reference photo.</li>
          <li><strong>Hobbyists and beginners</strong> learning to draw by tracing as a practice method.</li>
          <li><strong>Crafters, designers, sign painters</strong> transferring logos and patterns onto physical surfaces.</li>
          <li><strong>Teachers and parents</strong> doing art activities with kids.</li>
        </ul>

        <h2>How to use TraceMate (about one minute)</h2>
        <ol>
          <li>Open <a href="https://www.tracemate.art/">tracemate.art</a> in your phone browser. Allow camera access.</li>
          <li>Tap upload and choose any image from your gallery — a photo, line drawing, or logo.</li>
          <li>Aim the camera at a sheet of paper. The image appears as a live overlay on the paper.</li>
          <li>Adjust opacity and scale, then trace the overlay onto the paper with a pencil.</li>
        </ol>

        <h2>Pricing</h2>
        <ul>
          <li><strong>Try free:</strong> every new account gets one free tracing session to test the AR overlay on real paper.</li>
          <li><strong>Monthly:</strong> $5 / month — unlimited tracing, cancel anytime.</li>
          <li><strong>3 Months:</strong> $10 — billed every 3 months, save 33% vs monthly.</li>
          <li><strong>Lifetime:</strong> $15 one-time — unlimited forever, limited to 10 spots.</li>
        </ul>
        <p>Payments are processed by Dodo Payments. Plan management is at <a href="https://www.tracemate.art/account">/account</a>.</p>

        <h2>How TraceMate compares</h2>
        <ul>
          <li><strong>vs Da Vinci Eye:</strong> TraceMate runs in any browser (no app store), and offers a one-time $15 lifetime plan instead of subscription-only pricing.</li>
          <li><strong>vs AR Sketch / Trace Anything:</strong> those are native iOS apps. TraceMate works in a browser on iOS, Android, and desktop with a webcam.</li>
          <li><strong>vs Papercopy Tracer / SketchAR:</strong> TraceMate has no install step and a cheaper paid tier ($5/mo).</li>
        </ul>

        <h2>Privacy</h2>
        <p>The reference image you trace stays on your device — TraceMate does not upload your art to any server for the tracing step. Only your account info (email, plan) is stored server-side, with Supabase.</p>

        <h2>Common questions</h2>
        <p><strong>Do I need to install an app?</strong> No. TraceMate is a web app. You can add it to your home screen for one-tap access, but no App Store / Play Store install is required.</p>
        <p><strong>What can I trace?</strong> Any image — photos, line drawings, sketches, logos, calligraphy, tattoo designs, portraits, anime art, technical drawings.</p>
        <p><strong>What devices work?</strong> iPhone (iOS 14+), Android (10+), iPad, and desktops with a webcam. Any modern browser: Chrome, Safari, Firefox, Edge.</p>
