<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fcf2ea" />
    <meta name="color-scheme" content="light" />

    <!-- Clean first-paint splash. The app shell's <body> background is dark
         (var(--ink)) and #root is visually empty until React mounts (the
         prerendered body is sr-only), so a PWA cold-launch used to flash a black
         screen during the JS load. This cream overlay + spinner paints instantly
         (inline, no JS/CSS dependency) and is faded out by main.jsx on mount. -->
    <style>
      #tm-boot{position:fixed;inset:0;z-index:2147483647;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:22px;background:#fcf2ea;
        transition:opacity .4s ease}
      #tm-boot img{width:104px;height:auto;animation:tm-boot-pulse 1.6s ease-in-out infinite}
      #tm-boot .tm-boot-spin{width:26px;height:26px;border-radius:50%;
        border:3px solid rgba(26,20,16,.14);border-top-color:#1a1410;
        animation:tm-boot-spin .8s linear infinite}
      @keyframes tm-boot-spin{to{transform:rotate(360deg)}}
      @keyframes tm-boot-pulse{0%,100%{opacity:.6}50%{opacity:1}}
      @media (prefers-reduced-motion:reduce){#tm-boot img,#tm-boot .tm-boot-spin{animation:none}}
      html.app-ready #tm-boot{opacity:0;pointer-events:none}
    </style>

    <!-- Primary -->
    <title>TraceMate — Trace anything on real paper</title>
    <meta name="description" content="Point your phone camera at paper, see your image as a live overlay, and trace it by hand. Browser-based. Early access." />
    <meta name="author" content="TraceMate" />
    <meta name="application-name" content="TraceMate" />
    <meta name="apple-mobile-web-app-title" content="TraceMate" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Robots — index everything public; noindex of private routes is handled per-route via meta tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.tracemate.art/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TraceMate" />
    <meta property="og:title" content="TraceMate — Trace anything on real paper" />
    <meta property="og:description" content="Point your phone camera at paper, see your image as a live overlay, and trace it by hand. Browser-based. Early access." />
    <meta property="og:url" content="https://www.tracemate.art/" />
    <meta property="og:image" content="https://www.tracemate.art/images/og/og-cover.png" />
    <meta property="og:image:secure_url" content="https://www.tracemate.art/images/og/og-cover.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TraceMate — phone displaying a drawing overlay onto real paper" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@tracemate" />
    <meta name="twitter:creator" content="@tracemate" />
    <meta name="twitter:title" content="TraceMate — Trace anything on real paper" />
    <meta name="twitter:description" content="Point your phone camera at paper, see your image as a live overlay, and trace it by hand. Browser-based. Early access." />
    <meta name="twitter:image" content="https://www.tracemate.art/images/og/og-cover.png" />
    <meta name="twitter:image:alt" content="TraceMate — phone displaying a drawing overlay onto real paper" />

    <!-- Icons — favicon, browser tab, iOS home screen, PWA -->
    <link rel="icon" type="image/png" sizes="16x16"  href="/icon-16.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/icon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="48x48"  href="/icon-48.png?v=2" />
    <link rel="icon" type="image/png" sizes="96x96"  href="/icon-96.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Sitemap hint (some crawlers honor this) -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Performance: preconnect to Google Fonts + preload critical assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Above-the-fold LCP: the hero phone image, plus the primary CTA + logo.
         Preloading the real LCP element (the hero image) at top priority fills
         the frame the instant the page paints. -->
    <link rel="preload" as="image" href="/images/hero/phone-preview-v3.avif" type="image/avif" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/ui/btn-try-now.avif" type="image/avif" />
    <link rel="preload" as="image" href="/images/brand/logo.avif" type="image/avif" />

    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Nunito:wght@400;500;600;700;800&family=Shadows+Into+Light&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

  </head>
  <body>
    <!-- Instant cream loading screen (styles in <head>). Sibling of #root so the
         prerender's #root injection never touches it; removed by main.jsx once
         React has mounted. -->
    <div id="tm-boot" aria-hidden="true">
      <img src="/images/brand/logo.webp" alt="" width="104" height="104" />
      <div class="tm-boot-spin"></div>
    </div>
    <div id="root"></div>
    <noscript>
      <div style="font-family:system-ui,sans-serif;padding:24px;max-width:560px;margin:40px auto;line-height:1.6;color:#222">
        <h1 style="margin:0 0 8px">TraceMate</h1>
        <p>Trace anything on real paper. Open <a href="https://www.tracemate.art/">tracemate.art</a> on your phone — JavaScript and camera access required.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
