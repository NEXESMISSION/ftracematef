<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fcf2ea" />
    <meta name="color-scheme" content="light" />

    <!-- Primary -->
    <title>TraceMate — Trace anything on real paper</title>
    <meta name="description" content="Point your phone camera at paper, see your image as a live overlay, and trace it by hand. Browser-based. Early access." />
    <meta name="author" content="TraceMate" />
    <meta name="application-name" content="TraceMate" />
    <meta name="apple-mobile-web-app-title" content="TraceMate" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Robots — index everything public; noindex of private routes is handled per-route via meta tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.tracemate.art/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TraceMate" />
    <meta property="og:title" content="TraceMate — Trace anything on real paper" />
    <meta property="og:description" content="Point your phone camera at paper, see your image as a live overlay, and trace it by hand. Browser-based. Early access." />
    <meta property="og:url" content="https://www.tracemate.art/" />
    <meta property="og:image" content="https://www.tracemate.art/images/og/og-cover.png" />
    <meta property="og:image:secure_url" content="https://www.tracemate.art/images/og/og-cover.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TraceMate — phone displaying a drawing overlay onto real paper" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@tracemate" />
    <meta name="twitter:creator" content="@tracemate" />
    <meta name="twitter:title" content="TraceMate — Trace anything on real paper" />
    <meta name="twitter:description" content="Point your phone camera at paper, see your image as a live overlay, and trace it by hand. Browser-based. Early access." />
    <meta name="twitter:image" content="https://www.tracemate.art/images/og/og-cover.png" />
    <meta name="twitter:image:alt" content="TraceMate — phone displaying a drawing overlay onto real paper" />

    <!-- Icons — favicon, browser tab, iOS home screen, PWA -->
    <link rel="icon" type="image/png" sizes="16x16"  href="/icon-16.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/icon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="48x48"  href="/icon-48.png?v=2" />
    <link rel="icon" type="image/png" sizes="96x96"  href="/icon-96.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Sitemap hint (some crawlers honor this) -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Performance: preconnect to Google Fonts + preload critical assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Above-the-fold hero + logo. The hero video's poster is preloaded at top
         priority so the frame is filled the instant the page paints (never an
         empty box), and the optimized MP4 is preloaded so playback starts fast. -->
    <link rel="preload" as="image" href="/videos/hero.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="video" href="/videos/hero.mp4" type="video/mp4" />
    <link rel="preload" as="image" href="/images/ui/btn-try-now.avif" type="image/avif" />
    <link rel="preload" as="image" href="/images/brand/logo.avif" type="image/avif" />

    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Nunito:wght@400;500;600;700;800&family=Shadows+Into+Light&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">

        {
          "@type": "WebSite",
          "@id": "https://www.tracemate.art/#website",
          "url": "https://www.tracemate.art/",
          "name": "TraceMate",
          "description": "Trace anything on real paper. Point your phone camera at paper, see your image as a live overlay, and trace it by hand.",
          "inLanguage": "en-US",
          "publisher": { "@id": "https://www.tracemate.art/#organization" }
        },
        {
          "@type": "Organization",
          "@id": "https://www.tracemate.art/#organization",
          "name": "TraceMate",
          "url": "https://www.tracemate.art/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.tracemate.art/icon-512-square.png?v=2",
            "width": 512,
            "height": 512,
            "caption": "TraceMate logo"
          },
          "image": "https://www.tracemate.art/images/og/og-cover.png",
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "hi@tracemate.art",
            "availableLanguage": ["English"]
          }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://www.tracemate.art/#app",
          "name": "TraceMate",
          "url": "https://www.tracemate.art/",
          "applicationCategory": "DesignApplication",
          "applicationSubCategory": "AR tracing & learn-to-draw app",
          "operatingSystem": "Web (iOS 14+, Android 10+, iPadOS, desktop browsers with a webcam)",
          "browserRequirements": "Requires a modern browser with camera access. No install.",
          "description": "Browser-based augmented-reality tracing app to learn drawing. Point your phone camera at paper, see any image as a live overlay, and trace it by hand. A practice tool for beginners, kids, and adults — and a no-install Da Vinci Eye alternative.",
          "image": "https://www.tracemate.art/images/og/og-cover.png",
          "publisher": { "@id": "https://www.tracemate.art/#organization" },
          "featureList": [
            "Live AR overlay on real paper through your phone camera",

            "Built-in image library",
            "Works on iPhone, Android, iPad, and desktop",
            "Reference image stays on your device",
            "One free tracing session per account"
          ],
          "offers": {
            "@type": "AggregateOffer",
            "priceCurrency": "USD",
            "lowPrice": "7.00",
            "highPrice": "15.00",
            "offerCount": 3,
            "offers": [
              { "@type": "Offer", "name": "Monthly", "price": "7.00", "priceCurrency": "USD", "category": "subscription" },
              { "@type": "Offer", "name": "3 Months", "price": "10.00", "priceCurrency": "USD", "category": "subscription" },
              { "@type": "Offer", "name": "Lifetime", "price": "15.00", "priceCurrency": "USD", "category": "one-time" }
            ]
          }
        }
      ]
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="font-family:system-ui,sans-serif;padding:24px;max-width:560px;margin:40px auto;line-height:1.6;color:#222">
        <h1 style="margin:0 0 8px">TraceMate</h1>
        <p>Trace anything on real paper. Open <a href="https://www.tracemate.art/">tracemate.art</a> on your phone — JavaScript and camera access required.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
